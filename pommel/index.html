<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pommel - Kitesabre Web Serial Controller</title>
  </head>
  <body>
    <div class="container">
      <h1>Kitesabre Web Serial Controller</h1>

      <div class="section">
        <h2>Serial Connection</h2>
        <div class="button-group">
          <button id="connectBtn">Connect</button>
          <button id="openBtn" disabled>Open Port</button>
          <button id="closeBtn" disabled>Close Port</button>
        </div>
        <div id="connectionStatus" class="status">Not connected</div>
      </div>

      <div class="section">
        <h2>Send Commands</h2>
        <div class="command-group">
          <label for="commandInput">Text Command:</label>
          <input
            type="text"
            id="commandInput"
            placeholder="e.g., p (ping), ? (help), ^ (up), v (down), < (left), > (right)"
            maxlength="10"
          />
          <button id="sendTextBtn">Send</button>
        </div>
        <div class="command-group" id="quickCommandsGroup">
          <button class="quick-cmd" data-cmd="p">Ping (p)</button>
          <button class="quick-cmd" data-cmd="?">Help (?)</button>
          <button class="quick-cmd" data-cmd="^">Up (^)</button>
          <button class="quick-cmd" data-cmd="v">Down (v)</button>
          <button class="quick-cmd" data-cmd="&lt;">Left (&lt;)</button>
          <button class="quick-cmd" data-cmd="&gt;">Right (&gt;)</button>
        </div>
        <div id="lastCommandSent" class="status">No command sent yet</div>
      </div>

      <div class="section">
        <h2>Incoming Data</h2>
        <div class="controls">
          <button id="clearLogBtn">Clear Log</button>
          <label>
            <input type="checkbox" id="autoscroll" checked />
            Auto-scroll
          </label>
          <label>
            <input type="checkbox" id="showRaw" checked />
            Show raw bytes
          </label>
        </div>
        <div id="dataLog" class="log"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
